services:
  - type: web
    name: analytics-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard!
      - key: FRONTEND_URL
        sync: false # Opcional: URL de tu frontend en Vercel/Netlify
